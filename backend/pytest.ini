[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
asyncio_mode = auto
asyncio_default_fixture_loop_scope = session
# Coverage отключен по умолчанию для быстрого запуска
# Используйте --cov=app для явного включения coverage
addopts = 
    -v
    --strict-markers
    --tb=short
    --log-cli-level=INFO
    -p no:warnings
markers =
    unit: Unit tests
    integration: Integration tests
    e2e: End-to-end tests
    slow: Slow running tests
    security: Security tests
    performance: Performance tests
