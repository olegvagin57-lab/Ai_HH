# version: '3.3'  # Deprecated in newer Docker Compose

services:
  mongodb:
    image: mongo:5.0
    container_name: hh_analyzer_mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
      - mongodb_config:/data/configdb
    environment:
      MONGO_INITDB_DATABASE: hh_analyzer
    command: mongod --wiredTigerCacheSizeGB 1 --bind_ip_all
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - hh_analyzer_network

  redis:
    image: redis:7-alpine
    container_name: hh_analyzer_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - hh_analyzer_network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: hh_analyzer_backend
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - MONGODB_URL=${MONGODB_URL:-mongodb://mongodb:27017}
      - MONGODB_DATABASE=${MONGODB_DATABASE:-hh_analyzer}
      - REDIS_URL=${REDIS_URL:-redis://redis:6379}
      - ENVIRONMENT=${ENVIRONMENT:-production}
      - DEBUG=${DEBUG:-false}
      - SECRET_KEY=${SECRET_KEY:-dev-secret-key-change-in-production}
      - CLOUDFLARE_WORKER_URL=${CLOUDFLARE_WORKER_URL:-https://proud-water-5293.olegvagin1311.workers.dev}
      - CORS_ORIGINS=${CORS_ORIGINS}
    depends_on:
      - mongodb
      - redis
    volumes:
      - ./backend:/app
      - backend_logs:/app/logs
    command: >
      sh -c "
        pip install -q git+https://github.com/arinaaageeva/parse_hh_data.git 2>/dev/null || echo 'Parser not installed, using mock data' &&
        uvicorn app.main:app --host 0.0.0.0 --port 8000 --workers 4 --no-access-log
      "
    restart: unless-stopped
    networks:
      - hh_analyzer_network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/health/live"]
      interval: 30s
      timeout: 10s
      retries: 3

  celery:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: hh_analyzer_celery
    env_file:
      - .env
    environment:
      - MONGODB_URL=${MONGODB_URL:-mongodb://mongodb:27017}
      - MONGODB_DATABASE=${MONGODB_DATABASE:-hh_analyzer}
      - REDIS_URL=${REDIS_URL:-redis://redis:6379}
      - ENVIRONMENT=${ENVIRONMENT:-production}
      - SECRET_KEY=${SECRET_KEY:-dev-secret-key-change-in-production}
      - CLOUDFLARE_WORKER_URL=${CLOUDFLARE_WORKER_URL:-https://proud-water-5293.olegvagin1311.workers.dev}
    depends_on:
      - mongodb
      - redis
      - backend
    volumes:
      - ./backend:/app
      - celery_logs:/app/logs
    command: >
      sh -c "
        pip install -q git+https://github.com/arinaaageeva/parse_hh_data.git 2>/dev/null || echo 'Parser not installed' &&
        celery -A celery_app.celery worker --loglevel=info --concurrency=4
      "
    restart: unless-stopped
    networks:
      - hh_analyzer_network

  celery-beat:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: hh_analyzer_celery_beat
    env_file:
      - .env
    environment:
      - MONGODB_URL=${MONGODB_URL:-mongodb://mongodb:27017}
      - MONGODB_DATABASE=${MONGODB_DATABASE:-hh_analyzer}
      - REDIS_URL=${REDIS_URL:-redis://redis:6379}
      - ENVIRONMENT=${ENVIRONMENT:-production}
      - SECRET_KEY=${SECRET_KEY:-dev-secret-key-change-in-production}
    depends_on:
      - mongodb
      - redis
    volumes:
      - ./backend:/app
    command: celery -A celery_app.celery beat --loglevel=info
    restart: unless-stopped
    networks:
      - hh_analyzer_network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: hh_analyzer_frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
    volumes:
      - ./frontend/nginx.prod.conf:/etc/nginx/conf.d/default.conf:ro
    restart: unless-stopped
    networks:
      - hh_analyzer_network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/"]
      interval: 30s
      timeout: 10s
      retries: 3

networks:
  hh_analyzer_network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16

volumes:
  mongodb_data:
    driver: local
  mongodb_config:
    driver: local
  redis_data:
    driver: local
  backend_logs:
    driver: local
  celery_logs:
    driver: local

