version: '3.7'

services:
  mongodb:
    image: mongo:5.0
    container_name: hh_analyzer_mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    environment:
      MONGO_INITDB_DATABASE: hh_analyzer
    command: mongod --wiredTigerCacheSizeGB 0.5
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 2G
        reservations:
          cpus: '0.5'
          memory: 512M

  redis:
    image: redis:7-alpine
    container_name: hh_analyzer_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 512M
        reservations:
          cpus: '0.25'
          memory: 128M

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: hh_analyzer_backend
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - MONGODB_URL=${MONGODB_URL:-mongodb://mongodb:27017}
      - MONGODB_DATABASE=${MONGODB_DATABASE:-hh_analyzer}
      - REDIS_URL=${REDIS_URL:-redis://redis:6379}
      - ENVIRONMENT=${ENVIRONMENT:-development}
      - DEBUG=${DEBUG:-true}
      - SECRET_KEY=${SECRET_KEY:-dev-secret-key-change-in-production-min-32-chars-required-12345678901234567890}
      - CLOUDFLARE_WORKER_URL=${CLOUDFLARE_WORKER_URL:-https://proud-water-5293.olegvagin1311.workers.dev}
      - CORS_ORIGINS=${CORS_ORIGINS:-http://localhost:3000}
    depends_on:
      - mongodb
      - redis
    volumes:
      - ./backend:/app
    command: >
      sh -c "
        pip install -q git+https://github.com/arinaaageeva/parse_hh_data.git 2>/dev/null || echo 'Parser not installed, using mock data' &&
        uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
      "
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 2G
        reservations:
          cpus: '0.5'
          memory: 512M

  celery:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: hh_analyzer_celery
    env_file:
      - .env
    environment:
      - MONGODB_URL=${MONGODB_URL:-mongodb://mongodb:27017}
      - MONGODB_DATABASE=${MONGODB_DATABASE:-hh_analyzer}
      - REDIS_URL=${REDIS_URL:-redis://redis:6379}
      - ENVIRONMENT=${ENVIRONMENT:-development}
      - SECRET_KEY=${SECRET_KEY:-dev-secret-key-change-in-production-min-32-chars-required-12345678901234567890}
      - CLOUDFLARE_WORKER_URL=${CLOUDFLARE_WORKER_URL:-https://proud-water-5293.olegvagin1311.workers.dev}
    depends_on:
      - mongodb
      - redis
      - backend
    volumes:
      - ./backend:/app
    command: >
      sh -c "
        pip install -q git+https://github.com/arinaaageeva/parse_hh_data.git 2>/dev/null || echo 'Parser not installed' &&
        celery -A celery_app.celery worker --loglevel=info
      "
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 2G
        reservations:
          cpus: '0.5'
          memory: 512M

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: hh_analyzer_frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 512M
        reservations:
          cpus: '0.25'
          memory: 128M

volumes:
  mongodb_data:
  redis_data:
