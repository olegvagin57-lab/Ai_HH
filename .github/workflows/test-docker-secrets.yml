name: Test Docker Secrets

on:
  workflow_dispatch:  # Allows manual trigger
  push:
    branches: [ main, master ]

jobs:
  test-secrets:
    name: Test Docker Hub Secrets
    runs-on: ubuntu-latest
    
    steps:
      - name: Check if secrets are set
        run: |
          echo "Checking Docker Hub secrets..."
          if [ -z "${{ secrets.DOCKER_USERNAME }}" ]; then
            echo "❌ DOCKER_USERNAME is not set!"
            exit 1
          else
            echo "✅ DOCKER_USERNAME is set"
          fi
          
          if [ -z "${{ secrets.DOCKER_PASSWORD }}" ]; then
            echo "❌ DOCKER_PASSWORD is not set!"
            exit 1
          else
            echo "✅ DOCKER_PASSWORD is set"
          fi
          
          echo "Username: ${{ secrets.DOCKER_USERNAME }}"
          echo "All secrets are configured correctly!"
      
      - name: Test Docker Hub login
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}
          logout: false
      
      - name: Verify login
        run: |
          echo "Testing Docker Hub connection..."
          docker pull hello-world || echo "Note: Cannot pull, but login might work"
          echo "✅ Docker Hub login successful!"
