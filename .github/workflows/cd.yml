name: CD Pipeline

on:
  push:
    branches: [ main, master ]
    tags:
      - 'v*'

jobs:
  build-and-push:
    name: Build and Push Docker Images
    runs-on: ubuntu-latest
    env:
      DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME }}
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      
      - name: Check Docker Hub secrets
        if: github.event_name != 'pull_request'
        run: |
          if [ -z "${{ secrets.DOCKER_USERNAME }}" ] || [ -z "${{ secrets.DOCKER_PASSWORD }}" ]; then
            echo "❌ Error: DOCKER_USERNAME or DOCKER_PASSWORD secrets are not set!"
            echo "Please add these secrets in: Settings → Secrets and variables → Actions"
            echo "Go to: https://github.com/${{ github.repository }}/settings/secrets/actions"
            exit 1
          else
            echo "✅ Docker Hub secrets are configured"
            USERNAME="${{ secrets.DOCKER_USERNAME }}"
            echo "Username length: ${#USERNAME}"
            echo "Username (first 3 chars): ${USERNAME:0:3}..."
            echo "Image will be: ${USERNAME}/hh-analyzer-backend"
            echo "Image will be: ${USERNAME}/hh-analyzer-frontend"
          fi
      
      - name: Login to Docker Hub
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}
          logout: false
      
      - name: Prepare Docker image names
        if: github.event_name != 'pull_request'
        id: docker-images
        run: |
          USERNAME="${{ secrets.DOCKER_USERNAME }}"
          
          # Extract username from email if email format is used
          # Docker Hub login can be email, but image names use username
          if [[ "$USERNAME" == *"@"* ]]; then
            # If email format (e.g., olegvagin57@gmail.com), use part before @
            USERNAME_FOR_IMAGE=$(echo "$USERNAME" | cut -d'@' -f1)
            echo "Email detected, using username part: $USERNAME_FOR_IMAGE"
          else
            USERNAME_FOR_IMAGE="$USERNAME"
          fi
          
          # Docker requires lowercase image names
          USERNAME_LOWER=$(echo "$USERNAME_FOR_IMAGE" | tr '[:upper:]' '[:lower:]')
          
          echo "Original username: $USERNAME"
          echo "Image username (lowercase): $USERNAME_LOWER"
          
          BACKEND_IMAGE="${USERNAME_LOWER}/hh-analyzer-backend"
          FRONTEND_IMAGE="${USERNAME_LOWER}/hh-analyzer-frontend"
          
          echo "backend-image=${BACKEND_IMAGE}" >> $GITHUB_OUTPUT
          echo "frontend-image=${FRONTEND_IMAGE}" >> $GITHUB_OUTPUT
      
      - name: Extract metadata for backend
        if: github.event_name != 'pull_request'
        id: meta-backend
        uses: docker/metadata-action@v5
        with:
          images: ${{ steps.docker-images.outputs.backend-image }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,format=short
      
      - name: Extract metadata for frontend
        if: github.event_name != 'pull_request'
        id: meta-frontend
        uses: docker/metadata-action@v5
        with:
          images: ${{ steps.docker-images.outputs.frontend-image }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,format=short
      
      - name: Build and push backend image
        if: github.event_name != 'pull_request'
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: true
          tags: ${{ steps.meta-backend.outputs.tags }}
          labels: ${{ steps.meta-backend.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64
      
      - name: Build and push frontend image
        if: github.event_name != 'pull_request'
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: true
          tags: ${{ steps.meta-frontend.outputs.tags }}
          labels: ${{ steps.meta-frontend.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64

  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    needs: build-and-push
    if: |
      (github.ref == 'refs/heads/develop' || github.ref == 'refs/heads/staging') &&
      secrets.STAGING_HOST != '' &&
      secrets.STAGING_USER != '' &&
      secrets.STAGING_SSH_KEY != ''
    environment:
      name: staging
      url: https://staging.yourdomain.com
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Check staging secrets
        run: |
          if [ -z "${{ secrets.STAGING_HOST }}" ] || [ -z "${{ secrets.STAGING_USER }}" ] || [ -z "${{ secrets.STAGING_SSH_KEY }}" ]; then
            echo "⚠️ Staging deployment secrets are not configured. Skipping deployment."
            echo "To enable staging deployment, add STAGING_HOST, STAGING_USER, and STAGING_SSH_KEY secrets."
            exit 0
          fi
      
      - name: Deploy to staging server
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.STAGING_HOST }}
          username: ${{ secrets.STAGING_USER }}
          key: ${{ secrets.STAGING_SSH_KEY }}
          script: |
            cd /opt/hh-analyzer
            docker-compose -f docker-compose.prod.yml pull
            docker-compose -f docker-compose.prod.yml up -d --build
            docker-compose -f docker-compose.prod.yml exec -T backend python -m pytest tests/ -v --tb=short || true
      
      - name: Run smoke tests
        run: |
          sleep 30
          curl -f https://staging.yourdomain.com/api/v1/health || exit 1
          curl -f https://staging.yourdomain.com/api/v1/health/ready || exit 1

  deploy-production:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: build-and-push
    if: |
      (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master' || startsWith(github.ref, 'refs/tags/v')) &&
      secrets.PRODUCTION_HOST != '' &&
      secrets.PRODUCTION_USER != '' &&
      secrets.PRODUCTION_SSH_KEY != ''
    environment:
      name: production
      url: https://yourdomain.com
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Check production secrets
        run: |
          if [ -z "${{ secrets.PRODUCTION_HOST }}" ] || [ -z "${{ secrets.PRODUCTION_USER }}" ] || [ -z "${{ secrets.PRODUCTION_SSH_KEY }}" ]; then
            echo "⚠️ Production deployment secrets are not configured. Skipping deployment."
            echo "To enable production deployment, add PRODUCTION_HOST, PRODUCTION_USER, and PRODUCTION_SSH_KEY secrets."
            exit 0
          fi
      
      - name: Deploy to production server
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.PRODUCTION_HOST }}
          username: ${{ secrets.PRODUCTION_USER }}
          key: ${{ secrets.PRODUCTION_SSH_KEY }}
          script: |
            set -e
            cd /opt/hh-analyzer
            
            # Backup current deployment
            echo "Creating backup..."
            docker-compose -f docker-compose.prod.yml ps -q > /tmp/running_containers.txt || true
            
            # Pull new images
            echo "Pulling new images..."
            docker-compose -f docker-compose.prod.yml pull
            
            # Run database migrations (if any)
            echo "Running migrations..."
            docker-compose -f docker-compose.prod.yml run --rm backend python scripts/run_migrations.py || echo "No migrations to run"
            
            # Deploy with zero downtime
            echo "Deploying..."
            docker-compose -f docker-compose.prod.yml up -d --no-deps --build backend celery celery-beat
            sleep 10
            docker-compose -f docker-compose.prod.yml up -d --no-deps frontend
            docker-compose -f docker-compose.prod.yml up -d nginx
            
            # Wait for health checks
            echo "Waiting for health checks..."
            timeout 60 bash -c 'until curl -f http://localhost:8000/api/v1/health/ready; do sleep 2; done' || exit 1
            
            # Run smoke tests
            echo "Running smoke tests..."
            curl -f http://localhost:8000/api/v1/health || exit 1
            curl -f http://localhost:8000/api/v1/health/ready || exit 1
            curl -f http://localhost/api/v1/health || exit 1
            
            # Cleanup old images
            echo "Cleaning up old images..."
            docker image prune -f
            
            echo "Deployment completed successfully!"
      
      - name: Run production smoke tests
        run: |
          sleep 30
          curl -f https://yourdomain.com/api/v1/health || exit 1
          curl -f https://yourdomain.com/api/v1/health/ready || exit 1
          curl -f https://yourdomain.com/api/v1/health/live || exit 1
      
      - name: Notify deployment
        if: success()
        uses: 8398a7/action-slack@v3
        with:
          status: ${{ job.status }}
          text: 'Production deployment successful!'
          webhook_url: ${{ secrets.SLACK_WEBHOOK_URL }}
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}

  rollback:
    name: Rollback on Failure
    runs-on: ubuntu-latest
    needs: deploy-production
    if: failure()
    environment:
      name: production
    
    steps:
      - name: Rollback deployment
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.PRODUCTION_HOST }}
          username: ${{ secrets.PRODUCTION_USER }}
          key: ${{ secrets.PRODUCTION_SSH_KEY }}
          script: |
            cd /opt/hh-analyzer
            echo "Rolling back deployment..."
            
            # Stop new containers
            docker-compose -f docker-compose.prod.yml down
            
            # Start previous containers if backup exists
            if [ -f /tmp/running_containers.txt ]; then
              cat /tmp/running_containers.txt | xargs docker start || true
            fi
            
            echo "Rollback completed"
