name: Deploy to Remote Server

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

concurrency:
  group: deploy-production
  cancel-in-progress: true

jobs:
  deploy:
    name: Deploy via SSH and Docker Compose
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Deploy on remote host
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SERVER_PORT || '22' }}
          script_stop: true
          command_timeout: 30m
          script: |
            set -eu

            APP_DIR="/opt/ai_hh"
            BRANCH="${{ github.ref_name }}"

            if [ ! -d "${APP_DIR}" ]; then
              sudo mkdir -p "${APP_DIR}"
              sudo chown -R "$USER":"$USER" "${APP_DIR}"
            fi

            if [ ! -d "${APP_DIR}/.git" ]; then
              git clone "https://github.com/${{ github.repository }}.git" "${APP_DIR}"
            fi

            cd "${APP_DIR}"
            git fetch origin
            git reset --hard "origin/${BRANCH}"

            if [ ! -f ".env" ]; then
              cp env.production.template .env
              echo "WARNING: .env was created from template. Fill SECRET_KEY and CORS_ORIGINS on server."
            fi

            docker compose -f docker-compose.prod.yml pull
            docker compose -f docker-compose.prod.yml up -d --build
            docker compose -f docker-compose.prod.yml ps

            sleep 10
            curl -fsS "http://localhost:8000/api/v1/health/live"
