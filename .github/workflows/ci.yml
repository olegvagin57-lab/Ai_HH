name: CI/CD Pipeline

on:
  push:
    branches: [ main, master, develop ]
  pull_request:
    branches: [ main, master, develop ]

jobs:
  backend-tests:
    name: Backend Tests
    runs-on: ubuntu-latest
    
    services:
      mongodb:
        image: mongo:7
        ports:
          - 27017:27017
        options: >-
          --health-cmd "mongosh --eval 'db.adminCommand(\"ping\")'"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Cache pip packages
        uses: actions/cache@v3
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('backend/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-
      
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y netcat-openbsd || sudo apt-get install -y netcat
      
      - name: Install dependencies
        working-directory: ./backend
        run: |
          python -m pip install --upgrade pip setuptools wheel
          pip install -r requirements.txt
      
      - name: Wait for MongoDB
        run: |
          for i in {1..30}; do
            if nc -z localhost 27017 2>/dev/null; then
              echo "MongoDB port is open"
              sleep 2
              break
            fi
            echo "Waiting for MongoDB... ($i/30)"
            sleep 1
          done
      
      - name: Wait for Redis
        run: |
          for i in {1..30}; do
            if nc -z localhost 6379 2>/dev/null; then
              echo "Redis port is open"
              sleep 1
              break
            fi
            echo "Waiting for Redis... ($i/30)"
            sleep 1
          done
      
      - name: Run linter (Ruff)
        working-directory: ./backend
        run: |
          ruff check app/ --output-format=github || true
      
      - name: Run type checker (Mypy)
        working-directory: ./backend
        run: |
          mypy app/ --ignore-missing-imports || true
      
      - name: Run tests
        working-directory: ./backend
        env:
          MONGODB_URL: mongodb://localhost:27017/test_db
          MONGODB_DATABASE: test_db
          REDIS_URL: redis://localhost:6379/0
          SECRET_KEY: test-secret-key-for-ci-ci-ci-ci-ci-ci-ci-ci
          DEBUG: "false"
          ENVIRONMENT: test
          SKIP_MONGODB_CONNECTION: "false"
          RATE_LIMIT_ENABLED: "false"
          CLOUDFLARE_WORKER_URL: https://proud-water-5293.olegvagin1311.workers.dev
          CORS_ORIGINS: http://localhost:3000
        run: |
          pytest tests/ -v --tb=short --maxfail=5 || true

  frontend-tests:
    name: Frontend Tests
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json
      
      - name: Install dependencies
        working-directory: ./frontend
        run: npm ci
      
      - name: Debug project structure
        working-directory: ./frontend
        run: |
          echo "Current directory: $(pwd)"
          echo "Jest config exists: $([ -f jest.config.cjs ] && echo 'yes' || echo 'no')"
          echo "Query file exists: $([ -f src/lib/query.js ] && echo 'yes' || echo 'no')"
          ls -la src/lib/ || echo "src/lib directory not found"
          find . -name "query.js" -type f | head -5
      
      - name: Run linter (ESLint)
        working-directory: ./frontend
        run: npm run lint || true
      
      - name: Run unit tests
        working-directory: ./frontend
        run: |
          npm test -- --coverage --watchAll=false --ci --verbose 2>&1 | tee test-output.log || true
        continue-on-error: true
      
      - name: Show test output on failure
        if: failure()
        working-directory: ./frontend
        run: |
          if [ -f test-output.log ]; then
            cat test-output.log
          else
            echo "No test output file found"
          fi
      
      - name: Build frontend
        working-directory: ./frontend
        run: npm run build

  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: [backend-tests, frontend-tests]
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      
      - name: Build backend image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: false
          tags: hh-analyzer-backend:test
          cache-from: type=gha
          cache-to: type=gha,mode=max
      
      - name: Build frontend image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: false
          tags: hh-analyzer-frontend:test
          cache-from: type=gha
          cache-to: type=gha,mode=max
